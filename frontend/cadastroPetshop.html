<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Royal Pet - Cadastro</title>
 
    <link rel="stylesheet" href="./style/cadastro.css">
 
    <script src="./controller/cadastro_controller.js" defer></script>
</head>
<body>
    <div class="container">
        <button type="button" class="btn-voltar" id="btnVoltar" onclick="window.location.href='./index.html'">← Voltar</button>
 
        <h2 class="titulo" id="tituloInicio">ROYAL PET</h2>
 
        <form id="formCadastro">
            <div class="form-grid">
                <div class="campo">
                    <label>Nome Completo</label>
                    <input type="text" id="nome" placeholder="Nome completo" required>
                </div>
 
                <div class="campo">
                    <label>E-mail</label>
                    <input type="email" id="email" placeholder="E-mail" required>
                </div>
 
                <div class="campo">
                    <label>Senha</label>
                    <input type="password" id="senha" placeholder="Digite sua senha" required>
                </div>
 
                <div class="campo">
                    <label>Confirmar a senha</label>
                    <input type="password" id="confirmarSenha" placeholder="Confirmar senha" required>
                </div>
            </div>
 
            <label class="termos">
                <input type="checkbox" id="termos" required>
                <span>Eu li e aceito os termos de uso e privacidade.</span>
            </label>
 
            <button type="submit" id="btnCriar">Criar minha conta</button>
            
            <button type="button" class="btn-entrar" id="btnEntrar" onclick="entrar()">Entrar</button>
        </form>
    </div>
</body>
</html>
