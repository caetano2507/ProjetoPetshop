<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Royal Pet - Login</title>
 
<link rel="stylesheet" href="./style/style.css">
 
<script src="./controller/login_controller.js" defer></script>
</head>
<body>
  <div class="container">
    <div class="card">
      <h2 class="titulo">ROYAL PET</h2>
 
      <form id="loginForm">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="Digite seu e-mail" autocomplete="email" required>
        <br>
 
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Digite sua senha" autocomplete="current-password" required>
        <br>
 
        <a href="#" id="esqueciSenha">Esqueceu a senha?</a>
 
        <button type="submit" id="btnEntrar">Entrar</button>
        <br><br>
        <p>Novo no RoyalPet? <a href="./cadastroPetshop.html">Crie sua conta</a></p>
      </form>
    </div>
  </div>
</body>
</html>
