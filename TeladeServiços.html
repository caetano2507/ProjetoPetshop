<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Pet — Serviços</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root {
  --bg: #f7f5f2;
  --white: #ffffff;
  --text: #1a1a1a;
  --muted: #7a7570;
  --border: #e8e4de;
  --green: #2d7a4e;
  --blue: #2563a8;
  --blue-light: #eaf1fb;
  --purple: #6b3fa0;
  --purple-light: #f3eefb;
  --red: #c0392b;
  --red-light: #fdf0ee;
  --orange: #c96a12;
  --orange-light: #fdf3e7;
  --radius: 20px;
  --radius-sm: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 15px 20px 40px 20px;
}

/* Adicionada a animação fadeUp aqui para a página inteira suavizar ao carregar */
.page {
  max-width: 900px;
  margin: 0 auto;
  animation: fadeUp 0.8s ease both;
}


/* HEADER */
.brand {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: -5px;
  margin-bottom: 20px;
  justify-content: center;
}

.brand-logo {
  font-family: 'Playfair Display', serif;
  font-size: 30px;
  font-weight: 900;
  color: var(--text);
  letter-spacing: -0.7px;
  text-decoration: none;  /* Serve para tirar o sublinhado da palavra. Sem isso, iria ficar sublinhado  */
}

.brand-logo span { color: var(--green); }

.brand-paw {
  font-size: 14px;  /* Muda o tamanho das patinhas por aqui */
  opacity: 0.6;
}

.hero-label {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--green);
  margin-bottom: 12px;
}

.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(36px, 6vw, 54px);
  font-weight: 800;
  line-height: 1.1;
  color: var(--text);
  margin-bottom: 16px;
  letter-spacing: -1px;
}

.hero-title .accent { color: var(--green); }

.hero-sub {
  font-size: 16px;
  color: var(--muted);
  max-width: 460px;
  line-height: 1.6;
  margin-bottom: 48px;
}

/* CARDS PRINCIPAIS */
.grid-3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 16px;
}

.grid-2 {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  margin-bottom: 40px;
}

.card {
  background: var(--white);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  animation: fadeUp 0.4s ease both;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.062);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card:nth-child(1) { animation-delay: 0.05s; }
.card:nth-child(2) { animation-delay: 0.12s; }
.card:nth-child(3) { animation-delay: 0.19s; }

/* Correção para que os cards da segunda fileira também peguem o efeito de delay corretamente */
.grid-2 .card:nth-child(1) { animation-delay: 0.26s; }
.grid-2 .card:nth-child(2) { animation-delay: 0.33s; }

.icon-wrap {
  width: 80px;
  height: 80px;
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  margin-bottom: 18px;
  position: relative;
}

.paw-deco {
  position: absolute;
  font-size: 10px;
  opacity: 0.2;
}
.paw-deco.tl { top: 4px; left: 6px; }
.paw-deco.br { bottom: 4px; right: 6px; }

.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
}

.card-desc {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.55;
  margin-bottom: 20px;
  flex: 1;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 20px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: filter 0.2s, transform 0.15s;
  text-decoration: none;
}

.btn:hover { filter: brightness(1.1); transform: scale(1.03); }

.btn-green  { background: var(--green);  color: #fff; }
.btn-blue   { background: var(--blue);   color: #fff; }
.btn-purple { background: var(--purple); color: #fff; }
.btn-red    { background: var(--red);    color: #fff; }
.btn-orange { background: var(--orange); color: #fff; }

.icon-blue  { background: var(--blue-light); }
.icon-purple { background: var(--purple-light); }
.icon-red    { background: var(--red-light); }
.icon-orange { background: var(--orange-light); }

/* features strip */
.features {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 40px;
}

.feature-item {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  animation: fadeUp 0.5s ease 0.4s both;
}

.feature-icon {
  background: var(--bg);
  border-radius: 10px;
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.feature-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}

.feature-sub {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}

/* footer */
footer {
  text-align: center;
  font-size: 12px;
  color: var(--muted);
  padding-top: 8px;
}

/* responsividade */
@media (max-width: 700px) {
  .grid-3 { grid-template-columns: 1fr; }
  .grid-2 { grid-template-columns: 1fr; }
  .features { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 400px) {
  .features { grid-template-columns: 1fr; }
}
</style>
</head>
                     
<body>

<div class="page">

  <div class="brand">
    <a class="brand-logo" href="Telainicio.html">
      Royal <span>Pet</span>
    </a>
    <span class="brand-paw">🐾</span>
  </div>

  <p class="hero-label">Nossos Serviços</p>
  <h1 class="hero-title">
    Cuidados e Serviços<br>
    <span class="accent">para o seu Pet 🐾</span>
  </h1>
  <p class="hero-sub">Agende, conheça e ofereça o melhor para seu melhor amigo.</p>

  <!-- Os containers agora são populados dinamicamente via MVC -->
  <div class="grid-3" id="container-servicos-principais"></div>
  <div class="grid-2" id="container-servicos-secundarios"></div>

  <div class="features">
    <div class="feature-item">
      <div class="feature-icon">🚚</div>
      <div>
        <p class="feature-title">Frete grátis</p>
        <p class="feature-sub">Acima de R$100</p>
      </div>
    </div>
    <div class="feature-item">
      <div class="feature-icon">⏱</div>
      <div>
        <p class="feature-title">Entrega rápida</p>
        <p class="feature-sub">Receba em até 24h</p>
      </div>
    </div>
    <div class="feature-item">
      <div class="feature-icon">🛡</div>
      <div>
        <p class="feature-title">Segurança</p>
        <p class="feature-sub">Ambiente monitorado</p>
      </div>
    </div>
    <div class="feature-item">
      <div class="feature-icon">📅</div>
      <div>
        <p class="feature-title">Agende online</p>
        <p class="feature-sub">Rápido e prático</p>
      </div>
    </div>
  </div>

  <footer>© 2026 Royal Pet</footer>

</div>

<script type="module" src="./Controller/Serviços_Controller.js"></script>

</body>
</html>
