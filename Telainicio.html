<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoyalPet - Telainicio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>

<header class="main-header">
    <div class="header-container">
        <a href="Telainicio.html" class="logo">Royal<span>Pet</span></a>
        
        <nav class="nav-links">
            <a href="loginPetshop.html" class="btn-inicio">Início</a>
            <!-- <a href="#">Produtos</a> -->
            <a href="TeladeServiços.html">Serviços</a>
            <a href="TelaPlanoSaude.html">Meu pet</a>
        </nav>

        <div class="search-and-actions">
            <div class="user-icons">
                <i href="atendimentoPetshop.html" class="fa-solid fa-headset"></i>
                
                <div class="cart-icon-wrapper">
                    <i class="fa-solid fa-cart-shopping" id="open-cart-icon"></i>
                    <span id="cart-badge" class="cart-badge" style="display: none;">0</span>
                </div>
                
                <div class="heart-icon-wrapper">
                    <i class="fa-regular fa-heart" id="open-heart-icon"></i>
                    <span id="heart-badge" class="heart-badge" style="display: none;">0</span>
                </div>
            </div>
        </div>
    </div>
</header>

<main class="hero">

    <div class="cards-wrapper">
        <a href="racaoPetshop.html" class="card-link">
            <div class="category-card">
                <div class="card-icon">
                    <img src="https://i.postimg.cc/6pWZvBLB/download-(20).png" alt="Rações">
                </div>
                <span>Rações</span>
            </div>
        </a>

        <a href="TeladosBrinquedos.html" class="card-link">
            <div class="category-card">
                <div class="card-icon">
                    <img src="https://i.postimg.cc/PJVgQXvT/download-(21).png" alt="Brinquedos">
                </div>
                <span>Brinquedos</span>
            </div>
        </a>

        <a href="acessoriosPetshop.html" class="card-link">
            <div class="category-card">
                <div class="card-icon">
                    <img src="https://i.postimg.cc/SNrTG10N/download-(16).png" alt="Acessórios">
                </div>
                <span>Acessórios</span>
            </div>
        </a>

        <a href="casasPetshop.html" class="card-link">
            <div class="category-card">
                <div class="card-icon">
                    <img src="https://i.postimg.cc/HLLLpx0z/download-(19).png" alt="Casas">
                </div>
                <span>Casas</span>
            </div>
        </a>
    </div>

    <div id="sidebar-cart" class="cart-sidebar">
        <div class="cart-header">
            <h2>Meu Carrinho</h2>
            <span id="close-cart" class="close-cart-btn">&times;</span>
        </div>

        <div id="cart-items-container" class="cart-items-list">
            <p class="empty-cart-msg">Seu carrinho está vazio.</p>
        </div>

        <div class="cart-footer">
            <div class="cart-total-row">
                <span class="cart-total-label">Total:</span>
                <span id="cart-total-value">R$ 0,00</span>
            </div>
            <a href="TelaFinalCompra.html" id="checkout-btn" class="finalize-purchase-btn">Finalizar Compra</a>
        </div>
    </div>

    <div id="sidebar-favorites" class="cart-sidebar">
        <div class="cart-header">
            <h2>Meus Favoritos</h2>
            <span id="close-favorites" class="close-cart-btn">&times;</span>
        </div>

        <div id="favorites-items-container" class="cart-items-list">
            <p class="empty-cart-msg">Sua lista de favoritos está vazia.</p>
        </div>

        <div class="cart-footer" id="favorites-footer" style="display: none;">
            <button id="add-all-to-cart-btn" class="finalize-purchase-btn" style="background: #2ecc71;">Adicionar tudo no carrinho</button>
        </div>
    </div>

</main>

<footer class="footer">
    <div class="footer-left">RoyalPet</div>
    <a href="TelaContato.html" class="footer-center">Contato</a>
    <a href="TelaSobreNos.html" class="footer-right">Sobre nós</a>
</footer>

<style>
:root {
    --azul-claro: #90E0EF;
    --azul-botao: #48CAE4;
    --azul-hover: #0096c7;
    --cinza-footer: #E0E0E0;
    --branco-transp: rgba(255, 255, 255, 0.85);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: #ffffff;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* header */
.main-header {
    background-color: var(--azul-claro);
    padding: 10px 20px;
    width: 100%;
}

.header-container {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
}


.logo {
    font-family: 'Playfair Display', serif;
    font-size: 24px;                        /* Tamanho exato padrão da sua Tela de Serviços */
    font-weight: 700;                       /* Peso exato padrão da sua Tela de Serviços */
    color: #1a1a1a;                         /* <--- ALTERE A COR DO "Royal" MANUALMENTE AQUI */
    text-decoration: none;
    display: inline-block;
}

.logo span {
    color: #2d7a4e;                         /* O verde exato do "Pet" da sua tela de serviços */
    font-weight: 700;
}

/* nav */
.nav-links {
    display: flex;
    gap: 44px;
    align-items: center;
}

.nav-links a {
    text-decoration: none;
    color: #000;
    font-weight: 600;
    font-size: 14px;
    transition: 0.3s;
}

.nav-links a:hover {
    color: var(--azul-hover);
}

.btn-inicio {
    background-color: var(--azul-botao);
    color: #fff;
    padding: 8px 20px;
    border-radius: 50px;
}

/* search + icons */
.search-and-actions {
    display: flex;
    align-items: center;
    gap: 25px;
}

.search-container {
    display: flex;
    align-items: center;
    background: #ffffff;
    border-radius: 999px;
    padding: 0 4px 0 16px;
    width: 280px;
    box-shadow: 0 4px 12px rgba(61, 61, 61, 0.322);
    transition: 0.3s;
    gap: 8px;
}

.search-container:focus-within {
    box-shadow: 0 4px 18px rgb(0, 0, 0);
    transform: scale(1.03);
}

.search-container input {
    border: none;
    outline: none;
    font-size: 14px;
    width: 100%;
    background: transparent;
    color: #333;
    height: 44px;
}

.search-container input::placeholder {
    color: #504e4eb6;
}

.search-container button {
    background: var(--azul-botao);
    border: none;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.3s;
    padding: 0;
    flex-shrink: 0; 
}

.search-container button:hover {
    background: var(--azul-hover);
    transform: scale(1.1);
}

.search-container i {
    color: white;
    font-size: 14px;
}

/* icones da direita */
.user-icons {
    display: flex;
    gap: 20px;
    font-size: 18px;
    align-items: center;
}

.user-icons i {
    cursor: pointer;
    transition: 0.2s;
}

.user-icons i:hover {
    transform: scale(1.2);
    color: var(--azul-hover);
}

/* Wrappers para os badges */
.cart-icon-wrapper, .heart-icon-wrapper {
    position: relative;
    display: inline-block;
}

/* Estilo unificado para os balões de notificação */
.cart-badge, .heart-badge {
    position: absolute;
    top: -8px;
    right: -10px;
    color: white;
    font-size: 11px;
    font-weight: bold;
    border-radius: 50%;
    width: 18px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    pointer-events: none;
    transition: transform 0.3s ease;
}

.cart-badge { background-color: #e74c3c; }
.heart-badge { background-color: #2ecc71; }

/* hero */
.hero {
    flex: 1;
    height: 80vh;
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
}

.cards-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 30px;
    flex-wrap: wrap;
}

.card-link {
    text-decoration: none;
    color: inherit;
}

.category-card {
    width: 180px;
    height: 220px;
    background: white;
    border-radius: 18px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: all 0.3s ease;
}

.category-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.18);
}

.card-icon img {
    width: 110px;
    height: 110px;
    object-fit: contain;
}

.category-card span {
    font-size: 18px;
    font-weight: 600;
}

/* footer */
.footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #ffffff;
    padding: 17px 40px;
    border-radius: 20px;
    position: relative; 
}

.footer-left, .footer-center, .footer-right {
    font-weight: bold;
    color: #000000;
    text-decoration: none;
    transition: color 0.3s;
    display: inline-flex; 
    align-items: center;
    height: 100%;
}

.footer-center {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
}

.footer-center:hover, .footer-right:hover {
    color: var(--azul-hover);
}

/* Design das abas laterais */
.cart-sidebar {
    position: fixed;
    top: 0;
    right: -380px;
    width: 380px;
    height: 100vh;
    background: #ffffff;
    box-shadow: -8px 0 30px rgba(0, 0, 0, 0.05);
    z-index: 999;
    transition: right 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex;
    flex-direction: column;
    border-left: 1px solid #f0f0f0;
}

.cart-sidebar.open {
    right: 0;
}

.cart-header {
    padding: 24px;
    border-bottom: 1px solid #f5f5f5;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.cart-header h2 {
    font-size: 1.25rem;
    color: #2c3e50;
    font-weight: 600;
}

.close-cart-btn {
    background: none;
    border: none;
    font-size: 1.4rem;
    color: #bbb;
    cursor: pointer;
    transition: color 0.2s;
}

.close-cart-btn:hover {
    color: #333;
}

.cart-items-list {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
}

.empty-cart-msg {
    color: #aaa;
    text-align: center;
    margin-top: 40px;
    font-size: 0.95rem;
}

.cart-item-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 15px;
    margin-bottom: 20px;
    padding-bottom: 15px;
    border-bottom: 1px solid #fbfbfb;
}

.cart-item-info {
    display: flex;
    align-items: center;
    gap: 15px;
    flex: 1;
    min-width: 0;
}

.cart-item-img-fixed {
    width: 60px;
    height: 60px;
    min-width: 60px;
    max-height: 60px;
    object-fit: contain;
    background: #f5f7fa;
    border-radius: 8px;
    padding: 6px;
    flex-shrink: 0;
}

.cart-item-details {
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow: hidden;
}

.cart-item-name {
    font-size: 0.9rem;
    font-weight: 600;
    color: #333;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.cart-item-price {
    font-size: 0.9rem;
    color: #2c3e50;
    font-weight: 700;
}

.action-buttons-container {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
}

.remove-item-btn, .add-to-cart-from-fav {
    background: none;
    border: none;
    color: #ccc;
    font-size: 0.9rem;
    cursor: pointer;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    padding: 0;
}

.remove-item-btn:hover {
    color: #e74c3c;
    background-color: rgba(231, 76, 60, 0.08);
    transform: scale(1.05);
}

.add-to-cart-from-fav:hover {
    color: #2ecc71;
    background-color: rgba(46, 204, 113, 0.08);
    transform: scale(1.05);
}

.cart-footer {
    padding: 20px 24px 24px 24px;
    border-top: 1px solid #f5f5f5;
    background: #fafbfc;
}

.cart-total-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;  
}

.cart-total-label {
    font-size: 0.9rem;
    font-weight: 600;
    color: #7f8c8d;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

#cart-total-value {
    font-size: 1.45rem;
    font-weight: 700;
    color: #2c3e50;
    letter-spacing: -0.5px;
    font-family: 'Segoe UI', Arial, sans-serif;
}

#checkout-btn, #add-all-to-cart-btn {
    display: block;          
    text-align: center;          
    text-decoration: none;       
    width: 100%;
    background: #2c3e50;
    color: white;
    border: none;
    padding: 14px;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.1s ease;
    box-shadow: 0 4px 12px rgba(44, 62, 80, 0.1);
}

#checkout-btn:hover { background: #1a252f; }
#add-all-to-cart-btn:hover { background: #27ae60 !important; }
#add-all-to-cart-btn:active { transform: scale(0.98); }

@media (max-width: 480px) {
    .cart-sidebar {
        width: 100%;
        right: -100%;
    }
}

@media (max-width: 992px) {
    .header-container { flex-direction: column; gap: 15px; }
    .search-container { width: 100%; }
    .hero { height: auto; padding: 50px 20px; }
}

@media (max-width: 600px) {
    .nav-links { display: none; } 
    .cards-wrapper { gap: 10px; }
    .category-card { width: 130px; height: 160px; }
}
</style>

<script type="module" src="./Controller/Telainicio_Controller.js"></script>

</body>
</html>
