<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoyalPet - Interface</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header class="main-header">
    <div class="header-container">
        <div class="logo">Royal<span>Pet</span></div>
        
        <nav class="nav-links">
            <a href="loginPetshop.html" class="btn-inicio">Início</a>
            <a href="#">Produtos</a>
            <a href="TeladeServiços.html">Serviços</a>
            <a href="TelaPlanoSaude.html">Meu pet</a>
        </nav>

        <div class="search-and-actions">
            <div class="search-container">
                <input type="text" placeholder="O que o seu Pet precisa?">
                <button><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
            <div class="user-icons">
                <i class="fa-solid fa-headset"></i>
                <i class="fa-solid fa-cart-shopping"></i>
                <i class="fa-regular fa-heart"></i>
            </div>
        </div>
    </div>
</header>

<main class="hero">
    <div class="cards-wrapper">
        <a href="racaoPetshop.html" class="card-link">
            <div class="category-card">
                <div class="card-icon">
                    <img src="https://i.postimg.cc/6pWZvBLB/download-(20).png" alt="Rações">
                </div>
                <span>Rações</span>
            </div>
        </a>

        <div class="category-card">
            <a href="TeladosBrinquedos.html" class="card-link">
            <div class="card-icon">
                <img src="https://i.postimg.cc/PJVgQXvT/download-(21).png" alt="Brinquedos">
            </div>
            <span>Brinquedos</span>
        </div>
        </a>

        <div class="category-card">
            <a href="acessoriosPetshop.html" class="card-link">
            <div class="card-icon">
                <img src="https://i.postimg.cc/SNrTG10N/download-(16).png" alt="Acessórios">
            </div>
            <span>Acessórios</span>
        </div>
        </a>

        <div class="category-card">
            <a href="casasPetshop.html" class="card-link"></a>
            <div class="card-icon">
                <img src="https://i.postimg.cc/HLLLpx0z/download-(19).png" alt="Casas">
            </div>
            <span>Casas</span>
        </div>
        </a>
    </div>
</main>

<footer class="footer">
    <div class="footer-left">RoyalPet</div>
    <div class="footer-center">Contato</div>
    <div class="footer-right">Sobre nós</div>
</footer>

<style>
:root {
    --azul-claro: #90E0EF;
    --azul-botao: #48CAE4;
    --azul-hover: #0096c7;
    --cinza-footer: #E0E0E0;
    --branco-transp: rgba(255, 255, 255, 0.85);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: #ffffff;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* header */
.main-header {
    background-color: var(--azul-claro);
    padding: 10px 20px;
    width: 100%;
}

.header-container {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.logo {
    font-size: 26px;
    font-weight: 700;
    color: #444;
}

.logo span { font-weight: 400; }

/* nav */
.nav-links {
    display: flex;
    gap: 44px;
    align-items: center;
}

.nav-links a {
    text-decoration: none;
    color: #000;
    font-weight: 600;
    font-size: 14px;
    transition: 0.3s;
}

.nav-links a:hover {
    color: var(--azul-hover);
}

.btn-inicio {
    background-color: var(--azul-botao);
    color: #fff;
    padding: 8px 20px;
    border-radius: 50px;
}

/* search + icons */
.search-and-actions {
    display: flex;
    align-items: center;
    gap: 25px;
}

/* Barra de pesquisa */
.search-container {
    display: flex;
    align-items: center;
    background: #ffffff;
    border-radius: 999px;
    padding: 0 4px 0 16px;  /* sem padding vertical */
    width: 280px;
    box-shadow: 0 4px 12px rgba(61, 61, 61, 0.322);
    transition: 0.3s;
    gap: 8px;
}

.search-container:focus-within {
    box-shadow: 0 4px 18px rgb(0, 0, 0);
    transform: scale(1.03);
}

.search-container input {
    border: none;
    outline: none;
    font-size: 14px;
    width: 100%;
    background: transparent;
    color: #333;
    height: 44px;
}

.search-container input::placeholder {
    color: #504e4eb6;
}


.search-container button {
    background: var(--azul-botao);
    border: none;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.3s;
    padding: 0;
    flex-shrink: 0; 
}

.search-container button:hover {
    background: var(--azul-hover);
    transform: scale(1.1);
}

.search-container i {
    color: white;
    font-size: 14px;
}
/* icones da direita */
.user-icons {
    display: flex;
    gap: 20px;
    font-size: 18px;
}

.user-icons i {
    cursor: pointer;
    transition: 0.2s;
}

.user-icons i:hover {
    transform: scale(1.2);
    color: var(--azul-hover);
}

/* hero */
.hero {
    flex: 1;
    height: 80vh;
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
}

.cards-wrapper {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
}

.category-card {
    background: var(--branco-transp);
    width: 150px;
    height: 200px;
    border-radius: 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    transition: 0.3s;
    cursor: pointer;
}

.category-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}

.card-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 110px;
}

.card-icon img {
    max-width: 130px;
    max-height: 160px;
    object-fit: contain;
}

.category-card span {
    font-weight: bold;
    color: #333;
}

.card-link {
    text-decoration: none;
    color: inherit;
}

/* footer */
.footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #ffffff;
    padding: 17px 40px;
    border-radius: 20px;
}

.footer-center {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-weight: bold;
}

.footer-left,
.footer-right {
    font-weight: bold;
}

/* responsividade */
@media (max-width: 992px) {
    .header-container { flex-direction: column; gap: 15px; }
    .search-container { width: 100%; }
    .hero { height: auto; padding: 50px 20px; }
}

@media (max-width: 600px) {
    .nav-links { display: none; } 
    .cards-wrapper { gap: 10px; }
    .category-card { width: 130px; height: 160px; }
}
</style>

</body>
</html>
