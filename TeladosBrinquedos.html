<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Pet - Brinquedos</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #ffffff; 
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* --- CABECALHO (AZUL) --- */
        .main-header {
            display: block;
            width: 100%;
            background-color: #d1f3ff;
            padding: 30px 25px;
            text-align: center;
            border-radius: 0px;
            margin-bottom: 0px;
            position: relative;
            text-decoration: none;
            color: inherit;
        }
        

        .main-header .logo {
            position: absolute;
            top: 40px;
            left: 30px;
            font-size: 1.1rem;
            color: #1a1a1a;
            font-weight: bold;
            text-decoration: none;
        }

        .main-header .logo span {
        color: #2d7a4e;
        }

        .main-header h1 {
            font-size: 3rem;
            font-weight: 700;
            color: #2c3e50;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .icon-red {
            color: #e74c3c;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .carousel-container {
            position: relative;
            margin-bottom: 50px;
        }

        .carousel-wrapper {
            position: relative;
            width: 100%;
            overflow: hidden;
        }

        .product-grid.carousel {
            display: flex;
            grid-template-columns: none;
            overflow-x: auto;
            scroll-behavior: smooth;
            gap: 25px;
            margin-bottom: 0;
            padding: 15px 5px;
            scrollbar-width: none;
        }

        .product-grid.carousel::-webkit-scrollbar {
            display: none;
        }

        .product-grid.carousel .product-card {
            flex: 0 0 calc(25% - 19px);
            min-width: 250px;
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(255, 255, 255, 0.9);
            border: 1px solid #ddd;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 15;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.2s, color 0.2s;
        }

        .carousel-btn:hover {
            background-color: #2c3e50;
            color: #fff;
        }

        #btn-prev { left: -20px; }
        #btn-next { right: -20px; }

        .product-card {
            background-color: #e6e9ed;
            border-radius: 12px;
            padding: 20px;
            position: relative; 
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .product-image {
            width: 100%;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
        }

        .product-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .wishlist-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 1.1rem;
            color: #aaa; 
            cursor: pointer;
            transition: color 0.2s;
        }

        .wishlist-btn:hover {
            color: #e74c3c;
        }

        .add-btn {
            position: absolute;
            bottom: 60px;
            right: 15px;
            background: none;
            border: none;
            font-size: 1.2rem;
            color: #777; 
            cursor: pointer;
            transition: color 0.2s;
        }

        .add-btn:hover {
            color: #2ecc71;
        }

        .info-area {
            width: 100%;
            text-align: left;
            margin-top: auto;
        }

        .product-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 6px;
            line-height: 1.2;
        }

        .discount-tag {
            display: inline-block;
            background-color: rgba(231, 76, 60, 0.1); 
            color: #e74c3c;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 4px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .price {
            font-size: 1.2rem;
            font-weight: 700;
            color: #2c3e50;
        }

        .super-oferta-badge {
            position: absolute;
            top: -10px;
            left: 15px;
            background-color: #e74c3c;
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 10;
        }

        @media (max-width: 900px) {
            .product-grid.carousel .product-card {
                flex: 0 0 calc(50% - 13px);
            }
        }

        @media (max-width: 600px) {
            .container { padding: 10px; }
            .product-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .product-card { padding: 10px; }
            .main-header { padding: 45px 15px 25px 15px; }
            .main-header .logo { position: static; display: block; margin-bottom: 5px; }
            .main-header h1 { font-size: 2rem; }
            .add-btn { bottom: 55px; font-size: 1rem; }
            .product-grid.carousel { gap: 10px; }
            .product-grid.carousel .product-card {
                flex: 0 0 calc(50% - 5px);
            }
            .carousel-btn { display: none; }
        }
    </style>
</head>

<body>
    <header class="main-header">
        <a href="Telainicio.html" class="header-link">
            <a href="Telainicio.html" class="logo">Royal<span>Pet</span></a>
        </a>
        <h1>Brinquedos</h1>
    </header>

    <main class="container">
        <section class="product-section">
            <h2 class="section-title">Produtos recomendados</h2>
            <div class="product-grid"></div>
        </section>

        <section class="product-section">
            <h2 class="section-title">Super Ofertas do Dia <i class="fas fa-tag icon-red"></i></h2>
            <div class="carousel-container">
                <button class="carousel-btn" id="btn-prev" onclick="scrollCarousel(-300)"><i class="fas fa-chevron-left"></i></button>
                <div class="carousel-wrapper">
                    <div class="product-grid carousel" id="ofertas-carousel"></div>
                </div>
                <button class="carousel-btn" id="btn-next" onclick="scrollCarousel(300)"><i class="fas fa-chevron-right"></i></button>
            </div>
        </section>
    </main>

    <script>
        const carousel = document.getElementById('ofertas-carousel');
        const carouselWrapper = document.querySelector('.carousel-wrapper');
        let autoScrollTimer; 
 
        function scrollCarousel(distancia) {
            carousel.scrollBy({ left: distancia, behavior: 'smooth' });
        } 
 
        function iniciarAutoPlay() {
            autoScrollTimer = setInterval(() => {
                const fimDoCarrossel = carousel.scrollLeft + carousel.offsetWidth >= carousel.scrollWidth - 10;
                if (fimDoCarrossel) {
                    carousel.scrollTo({ left: 0, behavior: 'smooth' });
                } else {
                    scrollCarousel(300);
                }
            }, 1900);
        }

        function pausarAutoPlay() {
            clearInterval(autoScrollTimer); 
        }
 
        iniciarAutoPlay();
        carouselWrapper.addEventListener('mouseenter', pausarAutoPlay);
        carouselWrapper.addEventListener('mouseleave', iniciarAutoPlay);
    </script>

    <script type="module" src="./Controller/Brinquedos_Controller.js"></script>
</body>
</html>
