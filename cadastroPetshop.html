<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Royal Pet - Cadastro</title>

    <!-- CSS -->
    <style>
        body{
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: url("https://i.postimg.cc/SsPPZKhm/Gemini-Generated-Image-tvworetvworetvwo.png") no-repeat center/cover;
        }

        .container{
            background: rgba(255, 255, 255, 0.74);
            padding: 35px;
            border-radius: 15px;
            width: 100%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0 ,2);
        }
            
        h2{
            margin-bottom:20px;
            
        }

        label{
            display: block;
            text-align: left;
            margin-top: 8px;
        }

        input{
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            margin-top: 3px;
            background: #050505ee;
            color: white;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 12px;
            background: rgba(173, 173, 173, 0.916);
            cursor: pointer;
        }

        button:active {
            transform: scale(0.95);
            background: rgba(173, 173, 173, 0.916);

        }

        .form-grid {
            display: grid;
            grid-template-columns: 2fr 2fr;
            gap: 30px;
        }

        .campo{
            display: flex;
            flex-direction: column;
        }

        .termos{
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .termos input{
            width: auto;
        }

        .termos label{
            display: inline;
            margin: 0;

        }

        .btn-voltar {
            background: none;
            border: none;
            color: #333;
            font-size: 15px;
            cursor: pointer;
            margin-bottom: 5px;
            text-align: left;
        }

        .btn-voltar:hover {
            text-decoration: underline;
        }

        .btn-entrar {
            background: none;
            border: none;
            color: #333;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
            text-align: center;
            width: 100%; 
        }

        .btn-entrar:hover {
            text-decoration: underline;
        }

        .titulo {
            cursor: pointer;
            padding: 10px;
            border-radius: 10px;
            transition: 0,2s;
}

    </style>
</head>
<body>
 <div class="container">
    <button class="btn-voltar" onclick="voltarLogin()">← Voltar</button>


    <h2 class="titulo" onclick="voltarTelaInicio()">ROYAL PET</h2>

    <!--Formulado do usuário-->
    <form id="formCadastro">
        <div class="form-grid">
            <!--Divs definindo qual tipo de informações podem ser passadas em cada campo-->
            <div class="campo">
                <label>Nome Completo</label>
                <input type="text" id="nome" placeholder="Nome completo" required>
            </div>
 
            <div class="campo">
                <label>E-mail</label>
                <input type="email" id="email" placeholder="E-mail" required>
            </div>
 
            <div class="campo">
                <label>Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha" required>
            </div>
 
            <div class="campo">
                <label>Confirmar a senha</label>
                <input type="password" id="confirmarSenha" placeholder="Confirmar senha" required>
            </div>
        </div>
 
        <label class="termos">
            <input type="checkbox" id="termos" required> <!--Chamei a caixinha de confirmação-->
            <span>Eu li e aceito os termos de uso e privacidade.</span>
        </label>
        
        <button type="submit" id="btnCriar">Criar minha conta</button> <!--Criei o botão/Criar minha-->
        <button type="button" class="btn-entrar" onclick="entrar()">Entrar</button>
    </form>
 </div>
 
 <script>
    // Pegamos/Selecionamos o formulário
    const form = document.getElementById('formCadastro');

    //Criei a função voltar
    function voltarLogin() {
    window.location.href = "loginPetshop.html";  //Local para onde vai voltar
}
 
    function entrar() {
    window.location.href ="loginPetshop.html";
    }

    function voltarTelaInicio() {
    window.location.href = "Telainicio.html";
    }

    form.addEventListener('submit', function(event) {
        // Impede a página de ficar recarregando
        event.preventDefault();
 
        // Pegando os valores dos campos
        const nome = document.getElementById('nome').value;
        const senha = document.getElementById('senha').value;
        const confirmarSenha = document.getElementById('confirmarSenha').value;
        const termos = document.getElementById('termos').checked;
 
        // Lógica de validação da senha e termos
        if (senha !== confirmarSenha) {
            alert(" As senhas não coincidem! Tente novamente.");
            return;
        }
 
        if (!termos) {
            alert(" Você precisa aceitar os termos de uso.");
            return;
        }
 
        // Simulação de sucesso
        alert(` Bem-vindo(a), ${nome}! Sua conta Royal Pet foi criada.`);
        
        // Aqui enviaria os dados para o seu servidor
        console.log("Dados prontos para envio:", { nome, senha });
    });
 </script>
</body>
