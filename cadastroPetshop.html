<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Royal Pet - Cadastro</title>

    <style>
        body{
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: url("https://i.postimg.cc/SsPPZKhm/Gemini-Generated-Image-tvworetvworetvwo.png") no-repeat center/cover;
        }

        .container{
            background: rgba(255, 255, 255, 0.74);
            padding: 35px;
            border-radius: 15px;
            width: 100%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0 ,2);
        }
            
        h2{
            margin-bottom:20px;
            
        }

        label{
            display: block;
            text-align: left;
            margin-top: 8px;
        }

        input{
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            margin-top: 3px;
            background: #050505ee;
            color: white;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: rgba(173, 173, 173, 0.916);
            cursor: pointer;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 2fr 2fr;
            gap: 30px;
        }

        .campo{
            display: flex;
            flex-direction: column;
        }

        .termos{
                display: flex;
                align-items: center;
                gap: 5px;
        }

        .termos input{
            width: auto;
        }

        .termos label{
            display: inline;
            margin: 0;

        }

    </style>
</head>
<body>
    <div class="container">

        <h2>ROYAL PET</h2>
        
        <div class="form-grid">

    <!-- Cadastro-->
        <div class="campo">
        <label>Nome Completo</label>
        <input type="text" placeholder="Nome completo"> 
        </div>

        <div class="campo">
        <label>E-mail</label>
        <input type="email" placeholder="E-mail">
        </div>

        <div class="campo">
        <label>Senha</label>
        <input type="password" placeholder="Digite sua senha">
        </div>

        <div class="campo">
        <label>Confirmar a senha</label>
        <input type="password" placeholder="Confirmar senha">
            </div>
        </div>

        <label class="termos">
            <input type="checkbox">
            <span>Eu li e aceito os termos de uso e privacidade.</span>
        </label>
        <button>Criar minha conta</button>
    </div>
    
</body>
</html>
