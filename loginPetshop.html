<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Royal Pet - Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class ="container">
<div class ="card">
<h2 class="titulo" onclick="voltarTelaInicio()">ROYAL PET</h2>
 
<form id="loginForm">
<label>E-mail</label>
<input type="email" id="email" placeholder="Digite seu e-mail" required>
<br>
 
<label>Senha</label>
<input type="password" id="senha" placeholder="Digite sua senha" required>
<br>
 
<a href="#" id="esqueciSenha">Esqueceu a senha?</a>
 
<button type="submit">Entrar</button>
<br>
<br>
<p>Novo no RoyalPet? <a href="cadastroPetshop.html">Crie sua conta</a></p>
</form>
</div>
</div>

<script>
    const loginForm = document.getElementById('loginForm');

    loginForm.addEventListener('submit', function(event) {
        event.preventDefault(); // Impede o recarregamento da página
 
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;
 
        // Simulação simples de login
        if (email === "admin@royalpet.com" && senha === "1234") {
            alert("Login realizado com sucesso! Bem-vindo.");
            // Redirecionar para uma home
        } else {
            alert("E-mail ou senha incorretos. Tente novamente!");
        }
    });

        function voltarTelaInicio() {
        window.location.href = "Telainicio.html";
        }
 
    // Função para o "Esqueceu a senha"

   document.addEventListener("DOMContentLoaded", function () {

    const loginForm = document.getElementById('loginForm');
    const esqueciSenha = document.getElementById('esqueciSenha');

    esqueciSenha.addEventListener('click', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value;

        if (!email) {
            alert("Digite seu e-mail no campo acima primeiro.");
            return;
        }

        alert("Recuperação enviada para: " + email);
    });

});
   
</script>
</body>
</html>
